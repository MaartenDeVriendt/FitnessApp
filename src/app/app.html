@if (user()) {
  <div class="shell">
    <header class="top">
      <a routerLink="/week" class="brand" (click)="closeMenu()">{{ brandLabel() }}</a>
      <button
        type="button"
        class="menu-btn"
        [class.open]="menuOpen()"
        [attr.aria-expanded]="menuOpen()"
        aria-controls="mobile-nav"
        [attr.aria-label]="menuOpen() ? 'Close menu' : 'Open menu'"
        (click)="toggleMenu()"
      >
        <span class="menu-icon" aria-hidden="true"></span>
      </button>
      <nav class="nav-desktop" aria-label="Main">
        <a routerLink="/week" routerLinkActive="active">Today</a>
        <a routerLink="/program" routerLinkActive="active">Week template</a>
        <a routerLink="/prs" routerLinkActive="active">PRs</a>
        <a routerLink="/profile" routerLinkActive="active">Profile</a>
        <button type="button" class="ghost" (click)="logout()">Sign out</button>
      </nav>
    </header>

    <div
      class="nav-backdrop"
      [class.open]="menuOpen()"
      (click)="closeMenu()"
      aria-hidden="true"
    ></div>
    <aside
      id="mobile-nav"
      class="nav-drawer"
      [class.open]="menuOpen()"
      [attr.aria-hidden]="!menuOpen()"
    >
      <div class="drawer-top">
        <span class="drawer-label">Menu</span>
        <button type="button" class="drawer-close" aria-label="Close menu" (click)="closeMenu()">×</button>
      </div>
      @if (currentRouteLabel(); as tab) {
        <p class="drawer-current">Now: <strong>{{ tab }}</strong></p>
      }
      <nav class="drawer-nav" aria-label="Main">
        <a routerLink="/week" routerLinkActive="active" (click)="closeMenu()">Today</a>
        <a routerLink="/program" routerLinkActive="active" (click)="closeMenu()">Week template</a>
        <a routerLink="/prs" routerLinkActive="active" (click)="closeMenu()">PRs</a>
        <a routerLink="/profile" routerLinkActive="active" (click)="closeMenu()">Profile</a>
      </nav>
      <button type="button" class="drawer-signout" (click)="logout()">Sign out</button>
    </aside>

    <main class="main">
      <router-outlet />
    </main>
  </div>
} @else {
  <!-- No header / nav: only the login screen (or brief blank while auth resolves). -->
  <div class="shell shell--guest">
    <router-outlet />
  </div>
}
