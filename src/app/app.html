<div class="shell">
  <header class="top">
    <a routerLink="/week" class="brand">Fitness PWA</a>
    @if (user()) {
      <nav>
        <a routerLink="/week" routerLinkActive="active">This week</a>
        <a routerLink="/program" routerLinkActive="active">Week template</a>
        <a routerLink="/prs" routerLinkActive="active">PRs</a>
        <button type="button" class="ghost" (click)="logout()">Sign out</button>
      </nav>
    }
  </header>
  <main class="main">
    <router-outlet />
  </main>
</div>
